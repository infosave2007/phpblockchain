; Production-safe PHP settings for the blockchain app.
; API responses must never contain HTML error notices — log them instead.
display_errors = Off
display_startup_errors = Off
log_errors = On
; Send errors to stderr so `docker compose logs` captures them
; (avoids flock/EDEADLK issues writing to bind-mounted log files on Docker Desktop)
error_log = /proc/self/fd/2
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_WARNING

memory_limit = 512M
max_execution_time = 120
max_input_time = 120
post_max_size = 16M
upload_max_filesize = 16M
date.timezone = UTC

; Opcache: revalidate every request so bind-mounted code edits always take effect
; (Docker Desktop bind mounts + a 2s revalidate window can otherwise serve stale bytecode).
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
